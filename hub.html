<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acorde Club — Comunidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tonaljs/tonal/browser/tonal.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://omnibrain.github.io/svguitar/js/svguitar.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark">
    <div class="background-animation"></div>
    <div class="chilean-flag-bg"></div>

    <div class="app-wrapper">
        <div class="glass-panel main-panel">

            <!-- ═══ TOP BAR ═══ -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <span class="theme-label"><i class="fa-solid fa-palette"></i> TEMAS</span>
                    <button class="theme-btn active" data-theme="naturaleza">Naturaleza</button>
                    <button class="theme-btn" data-theme="bliss">Bliss</button>
                    <button class="theme-btn" data-theme="oceano">Océano</button>
                    <button class="theme-btn" data-theme="playa">Playa</button>
                </div>
                <div class="top-bar-right">
                    <button id="btn-create-song" class="btn btn-accent btn-sm" title="Crear canción">
                        <i class="fa-solid fa-circle-plus"></i>
                    </button>
                    <button id="btn-theme-toggle-hub" class="btn btn-icon btn-ghost" title="Cambiar tema">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>

            <!-- ═══ HEADER ═══ -->
            <header>
                <div class="logo">
                    <div class="logo-icon">
                        <div class="logo-flag"></div>
                        <i class="fa-solid fa-guitar"></i>
                    </div>
                    <h1>Acorde Club</h1>
                </div>
                <div class="header-tags">
                    <span class="tag">Comunidad</span>
                </div>
            </header>

            <!-- ═══ HERO CTA ═══ -->
            <div class="hub-hero">
                <div class="hub-hero-text">
                    <h2><i class="fa-solid fa-pen-fancy"></i> ¿Listo para crear tu próxima canción?</h2>
                    <p>Compón acordes, elige ritmos y comparte tu música con la comunidad.</p>
                </div>
                <button id="btn-create-song-hero" class="btn btn-create-hero">
                    <i class="fa-solid fa-circle-plus"></i> Crear Canción
                </button>
            </div>

            <!-- ═══ SEARCH ═══ -->
            <div class="hub-search">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="hub-filter" placeholder="Busca canciones por título, artista o género..." class="form-control" autocomplete="off" name="hub-search">
                <span id="hub-song-count" class="hub-count">0 canciones</span>
            </div>

            <!-- ═══ SONG GRID ═══ -->
            <div id="hub-grid" class="hub-grid">
                <div class="empty-state" id="hub-empty">
                    <i class="fa-solid fa-music"></i>
                    <p>Aún no hay canciones en la comunidad.</p>
                    <p style="font-size:0.85rem; opacity:0.7;">¡Crea tu primera canción!</p>
                </div>
            </div>

            <footer class="app-footer">
                <span>© joaquín alejandro osses olmedo</span>
            </footer>

        </div>
    </div>

    <!-- ═══ SONG DETAIL MODAL ═══ -->
    <div id="detail-modal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="detail-title"><i class="fa-solid fa-music"></i> <span></span></h2>
                <div class="modal-actions">
                    <button id="btn-detail-play" class="btn btn-primary btn-sm" title="Reproducir">
                        <i class="fa-solid fa-play"></i> Reproducir
                    </button>
                    <button id="btn-detail-download" class="btn btn-secondary btn-sm" title="Descargar JSON">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button id="btn-detail-close" class="btn btn-sm btn-ghost">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
            <div id="detail-body" class="detail-body">
                <div class="detail-info">
                    <span class="detail-artist" id="detail-artist"></span>
                    <div class="detail-tags" id="detail-tags"></div>
                </div>
                <div class="detail-chords" id="detail-chords">
                    <h4><i class="fa-solid fa-guitar"></i> Acordes</h4>
                    <div id="detail-chord-diagrams" class="detail-chord-grid"></div>
                </div>
                <div class="detail-lyrics" id="detail-lyrics">
                    <h4><i class="fa-solid fa-align-left"></i> Letra</h4>
                    <pre id="detail-lyrics-text"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="hub.js"></script>
</body>
</html>
